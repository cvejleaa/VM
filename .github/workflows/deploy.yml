name: Deploy til Firebase

# Manuel udløsning fra GitHub → fanen "Actions" → "Deploy til Firebase" → "Run workflow".
# Kræver repo-secret FIREBASE_SERVICE_ACCOUNT (indholdet af en service-account-JSON,
# se docs/firebase-setup.md). Intet deployes automatisk ved push — kun når du trykker.
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Hvad skal deployes?'
        type: choice
        default: hosting-rules
        options:
          - hosting-rules        # frontend + security rules + indexes (virker på gratis Spark-plan)
          - functions            # kun Cloud Functions (kræver Blaze-plan)
          - all                  # alt (kræver Blaze-plan)
      seed:
        description: 'Indlæs kampe/bonus i databasen bagefter? (seed)'
        type: boolean
        default: false
      onlyFunction:
        description: 'Deploy KUN denne ene Cloud Function (fx importKnockoutFromFootballData). Tom = brug "target" ovenfor. Undgår Gen2-concurrency-fejl.'
        type: string
        default: ''

# Kør GitHub's JavaScript-actions på Node 24 (Node 20 udfases)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: vm2026-tip
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Installer afhængigheder
        run: |
          npm ci
          cd functions && npm ci

      - name: Skriv service-account fra secret
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"

      - name: Installer Firebase CLI
        run: npm install -g firebase-tools

      - name: Skriv .env til build (offentlig web-config fra repo-variabler)
        if: ${{ inputs.target != 'functions' && inputs.onlyFunction == '' }}
        run: |
          if [ -z "${{ vars.VITE_FIREBASE_PROJECT_ID }}" ]; then
            echo "::error::Mangler repo-variabler VITE_FIREBASE_* — tilføj dem under Settings → Secrets and variables → Actions → Variables før deploy (se docs/firebase-setup.md)."
            exit 1
          fi
          cat > .env <<EOF
          VITE_FIREBASE_API_KEY=${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_USE_EMULATORS=false
          VITE_OWNER_EMAIL=${{ vars.VITE_OWNER_EMAIL }}
          VITE_RECAPTCHA_SITE_KEY=${{ vars.VITE_RECAPTCHA_SITE_KEY }}
          EOF

      - name: Byg frontend
        if: ${{ inputs.target != 'functions' && inputs.onlyFunction == '' }}
        run: npm run build

      - name: Deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          # Deploy ÉN del med op til 3 forsøg + backoff. Fanger den forbigående
          # "Failed to authenticate", og behandler hostings idempotente
          # "is the current active version" som succes.
          deploy_once() {
            only="$1"; n=0; max=3
            until [ "$n" -ge "$max" ]; do
              n=$((n + 1))
              echo "::group::Deploy '$only' (forsøg $n/$max)"
              set +e
              out=$(firebase deploy --only "$only" --project "$PROJECT_ID" --non-interactive --force 2>&1)
              code=$?
              set -e
              echo "$out"
              echo "::endgroup::"
              # Gen2-functions kan ramme en concurrency-grænse (HTTP 409 "unable
              # to queue") så ENKELTE funktioner ikke bliver færdige — selvom
              # firebase deploy ender med exit 0. Det efterlader fx en ny funktion
              # uden invoker-IAM (browseren får CORS-fejl). Prøv igen for at
              # fuldføre de manglende funktioner.
              partial=$(echo "$out" | grep -cE "failed to (create|update) function" || true)
              if [ "$code" -eq 0 ] && [ "$partial" -eq 0 ]; then
                echo "OK: '$only' (forsøg $n/$max)."; return 0
              fi
              if echo "$out" | grep -q "is the current active version"; then
                echo "OK: '$only' allerede live (idempotent)."; return 0
              fi
              if [ "$code" -eq 0 ] && [ "$partial" -gt 0 ]; then
                echo "::warning::Delvis functions-fejl ($partial) — prøver igen for at fuldføre."
                if [ "$n" -ge "$max" ]; then
                  # FEJL SYNLIGT: en funktion der stadig ikke kunne opdateres efter
                  # alle forsøg (fx en fastlåst Gen2-operation / vedvarende 409) er
                  # IKKE en succes — ellers shipper vi gammel kode bag et grønt flueben.
                  # (Ved 'all' er hosting allerede udgivet som sin egen release, så
                  # dette blokerer aldrig frontend.)
                  echo "::error::'$only' havde stadig fejlede funktioner efter $max forsøg (fx fastlåst Gen2-operation/409). Fejler synligt — kør igen når operationen er drænet."
                  return 1
                fi
              else
                echo "::warning::Deploy af '$only' fejlede (forsøg $n/$max)."
              fi
              # Længere backoff: en Gen2 "operation in progress"/409 skal have tid
              # til at dræne, ellers re-fejler næste forsøg straks (60s, 120s).
              [ "$n" -lt "$max" ] && sleep $((n * 60))
            done
            echo "::error::Deploy af '$only' fejlede efter $max forsøg."
            return 1
          }

          ONLY_FUNCTION="${{ inputs.onlyFunction }}"
          if [ -n "$ONLY_FUNCTION" ]; then
            # Deploy én enkelt funktion — ingen concurrency-kamp, så dens
            # invoker-IAM bliver sat korrekt (fikser CORS på nye funktioner).
            # Fejl synligt hvis funktionen ikke kunne opdateres (intet andet at beskytte).
            deploy_once "functions:$ONLY_FUNCTION" || exit 1
          else
            case "${{ inputs.target }}" in
              hosting-rules)
                deploy_once "hosting,firestore:rules,firestore:indexes" || exit 1
                ;;
              functions)
                deploy_once "functions" || exit 1
                ;;
              all)
                # Hosting/regler FØRST og som sin egen udgivelse, så en
                # functions-fejl aldrig kan blokere frontend-udgivelsen.
                deploy_once "hosting,firestore:rules,firestore:indexes" || exit 1
                deploy_once "functions" || exit 1
                ;;
            esac
          fi

      # Firebase sætter ikke pålideligt allUsers/run.invoker på Gen2-callables
      # i dette projekt (sandsynligvis pga. en org-policy), og HVERT deploy
      # nulstiller bindingen — så browseren får CORS/401. Vi sætter den derfor
      # selv efter hvert functions-deploy, så callables forbliver kaldbare.
      - name: Sæt invoker-IAM (allUsers) på callable functions
        if: ${{ inputs.onlyFunction != '' || inputs.target == 'functions' || inputs.target == 'all' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/sa.json" --quiet
          # KUN callable (onCall) funktioner må være allUsers-kaldbare fra browseren.
          # Cloud Run-servicenavnet = funktionsnavnet i små bogstaver. Skemalagte og
          # trigger-funktioner SKAL forblive private (de har ingen egne auth-tjek).
          CALLABLES="adminlistuseremails adminscrubuseremails adminsendpasswordreset awardderivedgroupwinnersnow backfillfifavenuesnow backfilltipparticipation buildknockout setautomationpaused setdatasource generateleaguerecapnow importknockoutfromfootballdata inspectfootballdata inspectmatchraw postsharpshooternote previewfifadata previewfifascoring previewfifasync previewfootballdata pruneorphanmatches recomputeallpointsnow redeeminvitecode regeneraterecaps resyncfifadetailsnow sendtestremindertome sendthankyouemails sendtipremindersnow syncfixtures syncgroupwinnersnow syncmatchdetailsnow syncresultsnow syncscorersnow syncstandingsnow"
          grant() {
            gcloud run services add-iam-policy-binding "$1" \
              --region=europe-west1 --member=allUsers --role=roles/run.invoker \
              --project="$PROJECT_ID" --quiet \
              && echo "allUsers → $1" || echo "::warning::Kunne ikke sætte invoker-IAM på $1"
          }
          revoke() {
            gcloud run services remove-iam-policy-binding "$1" \
              --region=europe-west1 --member=allUsers --role=roles/run.invoker \
              --project="$PROJECT_ID" --quiet >/dev/null 2>&1 \
              && echo "fjernede allUsers fra $1" || true
          }
          if [ -n "${{ inputs.onlyFunction }}" ]; then
            grant "$(echo "${{ inputs.onlyFunction }}" | tr '[:upper:]' '[:lower:]')"
          else
            # Selvhelende: callables får allUsers, alt andet får det fjernet.
            for s in $(gcloud run services list --region=europe-west1 \
                        --project="$PROJECT_ID" --format='value(metadata.name)'); do
              echo "::group::IAM → $s"
              if echo " $CALLABLES " | grep -q " $s "; then grant "$s"; else revoke "$s"; fi
              echo "::endgroup::"
            done
          fi

      - name: Seed database (valgfrit)
        if: ${{ inputs.seed }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: npm run seed
