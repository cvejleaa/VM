name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    name: Frontend – lint, unit-tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Skriv dummy .env til build
        run: |
          cat > .env <<'EOF'
          VITE_FIREBASE_API_KEY=demo-key
          VITE_FIREBASE_AUTH_DOMAIN=demo.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=demo-vm2026
          VITE_FIREBASE_STORAGE_BUCKET=demo.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID=000000000000
          VITE_FIREBASE_APP_ID=1:000000000000:web:demo
          VITE_USE_EMULATORS=false
          VITE_OWNER_EMAIL=cvejleaa@gmail.com
          EOF
      - run: npm run lint
      - run: npm run test:coverage
      - run: npm run build

  functions:
    name: Functions – scoring & standings tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd functions && npm ci && npm test

  rules:
    name: Firestore Security Rules (emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: npm ci
      - run: cd functions && npm ci
      - run: npm install -g firebase-tools
      - name: Kør rules-tests mod Firestore-emulator
        run: firebase emulators:exec --only firestore "npm run test:rules" --project demo-vm2026

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Skriv dummy .env
        run: |
          cat > .env <<'EOF'
          VITE_FIREBASE_API_KEY=demo-key
          VITE_FIREBASE_AUTH_DOMAIN=demo.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=demo-vm2026
          VITE_FIREBASE_STORAGE_BUCKET=demo.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID=000000000000
          VITE_FIREBASE_APP_ID=1:000000000000:web:demo
          VITE_USE_EMULATORS=false
          VITE_OWNER_EMAIL=cvejleaa@gmail.com
          EOF
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
